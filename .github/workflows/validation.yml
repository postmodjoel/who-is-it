name: gameplay-validation

on:
  pull_request: {}
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      exhaustive:
        description: Run every player/device/effect/network scenario
        required: false
        default: true
        type: boolean
      balance:
        description: Run the full 20,000-session-per-cell balance laboratory
        required: false
        default: false
        type: boolean

jobs:
  shared:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run test:integrity
      - run: npm run test:shared
      - run: npm run test:balance:smoke
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: groupthink-smoke-evidence
          path: test-results/groupthink-lab/
          if-no-files-found: ignore

  exhaustive:
    if: github.event_name == 'workflow_dispatch' && inputs.exhaustive
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run test:exhaustive

  balance:
    needs: exhaustive
    if: github.event_name == 'workflow_dispatch' && inputs.balance && inputs.exhaustive
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: GT_LAYOUT_VALIDATED=1 npm run test:balance
      - uses: actions/upload-artifact@v4
        with:
          name: groupthink-balance-evidence
          path: test-results/groupthink-lab/
