<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>WHO? IS IT?</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='8' fill='%23ffbe0b'/%3E%3Ccircle cx='32' cy='24' r='13' fill='%23fffdf7' stroke='%23171512' stroke-width='4'/%3E%3Cpath d='M14 58c2-16 34-16 36 0' fill='%233a86ff' stroke='%23171512' stroke-width='4'/%3E%3C/svg%3E">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800;900&family=Space+Grotesk:wght@500;600;700&family=Press+Start+2P&family=Cinzel:wght@500;600;700;800;900&family=MedievalSharp&family=Reem+Kufi:wght@500;600;700&display=swap">
    <link rel="stylesheet" href="styles.css?v=156">
  </head>
  <body>
    <div id="locationBackdrop" class="location-backdrop" aria-hidden="true"></div>
    <div id="app">
      <div id="floatingSecret" class="floating-secret" aria-hidden="true">
        <img alt="">
        <span class="fs-name"></span>
      </div>
      <div class="game-layout">
        <aside class="game-side">
          <div class="side-panel">
            <div class="side-head">
              <h1><span class="brand-who">WHO?</span><span class="brand-isit">IS IT?</span></h1>
              <span id="roomCode" class="room-code"></span>
            </div>

            <div class="side-you">
              <div id="secretCard" class="secret-card is-hidden"></div>
            </div>

            <div class="cue-card" aria-live="polite">
              <p class="label">The question</p>
              <p id="questionPrompt" class="question-prompt"></p>
              <p id="mysteryResult" class="mystery-result"></p>
            </div>

            <div class="side-actions">
              <div class="game-bar-actions">
                <button id="swapSeatButton" class="button compact icon-only" type="button" aria-label="End round" title="End round"></button>
              </div>
            </div>

            <div id="opponentPanel" class="opponent-panel"></div>

            <div id="seatRoster" class="seat-roster" aria-label="Room seats"></div>
            <span id="roomStatus" class="room-status"></span>
          </div>
        </aside>

        <main class="game-stage">
          <div class="stage-top">
            <section id="locationBand" class="location-band" aria-live="polite"></section>
            <div class="topbar-actions">
              <select id="sortSelect" class="button ghost" title="Sort board by" aria-label="Sort board by">
                <option value="">Board order</option>
                <option value="happiness">Happiness 😀</option>
                <option value="horniness">Horniness 🔥</option>
                <option value="deathness">Close to death 💀</option>
                <option value="cum">Cum count 💦</option>
                <option value="fuck">Fuckability 😏</option>
                <option value="skin">Skin tone 🎨</option>
                <option value="name">Name A–Z</option>
              </select>
              <select id="debugEffectPicker" class="button ghost" title="Debug: trigger a mystery effect" aria-label="Debug effect">
                <option value="">Effect…</option>
              </select>
              <button id="editorButton" class="button ghost" type="button" aria-label="Character editor" title="Character editor" style="font-size:1rem">🎨</button>
              <button id="soundButton" class="button ghost" type="button" aria-label="Sound" title="Sound &amp; music" style="font-size:1rem">🔊</button>
              <button id="themeButton" class="button ghost icon-only" type="button" aria-label="Light mode" title="Light mode"></button>
              <button id="setupButton" class="button ghost icon-only" type="button" aria-label="Setup" title="Setup"></button>
            </div>
          </div>
          <div class="board-wrap">
            <div id="hintShelf" class="hint-shelf"></div>
            <div id="characterBoard" class="character-board" aria-label="Character board"></div>
          </div>
        </main>
      </div>
    </div>

    <dialog id="setupDialog" class="setup-dialog">
      <form method="dialog" class="setup-form">
        <div class="dialog-head">
          <div>
            <p class="eyebrow">Game setup</p>
            <h2>Choose the nonsense</h2>
          </div>
          <button class="icon-button" value="cancel" aria-label="Close setup" type="submit">X</button>
        </div>

        <div class="settings-grid">
          <label class="toggle-row">
            <span>
              <strong>Absurd prompts</strong>
              <small>Darker social questions.</small>
            </span>
            <input id="settingPrompts" type="checkbox" checked>
          </label>

          <label class="toggle-row">
            <span>
              <strong>Mystery effects</strong>
              <small>One random power per player.</small>
            </span>
            <input id="settingMystery" type="checkbox" checked>
          </label>

          <label class="toggle-row">
            <span>
              <strong>Locations</strong>
              <small>Grounded setting, image, and mood.</small>
            </span>
            <input id="settingLocations" type="checkbox" checked>
          </label>

          <label class="toggle-row">
            <span>
              <strong>Roles</strong>
              <small>Everyone gets a job, hidden until the Role Reveal mystery hits.</small>
            </span>
            <input id="settingRoles" type="checkbox" checked>
          </label>

          <label class="toggle-row">
            <span>
              <strong>PG mode 🧒</strong>
              <small>Kid-safe: only wholesome modes, no breeding/woohoo. Nephew-approved.</small>
            </span>
            <input id="settingPG" type="checkbox" checked>
          </label>
        </div>

        <label class="select-row">
          <span>
            <strong>Board size</strong>
            <small>Smaller boards breathe better on phones.</small>
          </span>
          <select id="settingBoardSize">
            <option value="18">18 faces</option>
            <option value="24" selected>24 faces</option>
            <option value="30">30 faces</option>
          </select>
        </label>

        <label class="select-row seed-row">
          <span>
            <strong>Seed code</strong>
            <small>Copy to share this exact round; paste one to replay it.</small>
          </span>
          <span class="seed-controls">
            <input id="settingSeed" type="text" spellcheck="false" autocomplete="off" placeholder="paste a seed code…">
            <button id="copySeedButton" class="button ghost" type="button" title="Copy seed code">📋</button>
          </span>
        </label>

        <div class="dialog-actions">
          <button id="saveSetupButton" class="button primary" value="default" type="submit">Start</button>
        </div>
      </form>
    </dialog>

    <script src="game-data.js?v=156"></script>
    <script src="face-generator.js?v=156"></script>
    <script src="faces-hair.js?v=156"></script>
    <script src="sound.js?v=156"></script>
    <script src="net.js?v=156"></script>
    <script src="breeding.js?v=156"></script>
    <script src="editor.js?v=156"></script>
    <script src="opponent-sim.js?v=156"></script>
    <script src="modes.js?v=156"></script>
    <script src="app.js?v=156"></script>
  </body>
</html>
