# WHO? IS IT? — Saltbox deployment (pulls a prebuilt image; no building on the server).
#
# The image is built by GitHub Actions on every push and published to GHCR. Your server just pulls
# it. With Watchtower running (below), every push I make auto-deploys — you never copy anything.
#
#   1. Set the image name once, in a .env file next to this (see .env.example):
#        WHO_IMAGE=ghcr.io/<your-github-username>/<repo-name>:latest
#   2. Edit DOMAIN below (who.onlybbm.com, 3×).
#   3. docker compose up -d
#
# Traefik proxies both HTTP and the WebSocket upgrade over the same router — no extra WS config.
# ---------------------------------------------------------------------------------------------------

networks:
  saltbox:
    external: true

services:
  who-is-it:
    image: ${WHO_IMAGE:-ghcr.io/CHANGE-ME/who-is-it:latest}
    # To build locally instead of pulling, comment the line above and uncomment:
    # build: .
    container_name: who-is-it
    restart: unless-stopped
    environment:
      - PORT=8080
    networks:
      - saltbox
    labels:
      com.github.saltbox.saltbox_managed: "true"
      traefik.enable: "true"
      # Tell Traefik which network to reach the container on (required, else the router silently
      # isn't built and you get a 404 for the host).
      traefik.docker.network: "saltbox"

      # Auto-update: Watchtower pulls a new image whenever CI publishes one.
      com.centurylinklabs.watchtower.enable: "true"

      # --- HTTP -> HTTPS redirect router ---
      traefik.http.routers.who-is-it-http.entrypoints: "web"          # *** older Saltbox: "http"
      traefik.http.routers.who-is-it-http.rule: "Host(`who.onlybbm.com`)"
      traefik.http.routers.who-is-it-http.middlewares: "globalHeaders@file,redirect-to-https@docker,cloudflarewarp@docker,gzip@file"
      traefik.http.routers.who-is-it-http.service: "who-is-it"

      # --- HTTPS router (serves the site + WebSocket) ---
      traefik.http.routers.who-is-it.entrypoints: "websecure"         # *** older Saltbox: "https"
      traefik.http.routers.who-is-it.rule: "Host(`who.onlybbm.com`)"
      traefik.http.routers.who-is-it.middlewares: "globalHeaders@file,secureHeaders@file,cloudflarewarp@docker,gzip@file"
      traefik.http.routers.who-is-it.tls.certresolver: "cfdns"        # *** if yours differs, copy from an existing container
      traefik.http.routers.who-is-it.tls.options: "securetls@file"
      traefik.http.routers.who-is-it.service: "who-is-it"

      # --- container's internal port ---
      traefik.http.services.who-is-it.loadbalancer.server.port: "8080"
