# WHO? IS IT? — Saltbox deployment.
#
# Builds the single-container server (game + room-sync WebSocket) and wires it into Saltbox's Traefik
# so it's served at your subdomain with HTTPS. Traefik proxies both plain HTTP and the WebSocket
# upgrade over the same router — no extra WS config needed.
#
#   1. Put this repo on your server, e.g. /opt/who-is-it
#   2. Edit DOMAIN below (and check the two labels marked *** if your Saltbox is older — see comments)
#   3. docker compose up -d --build
#
# ---------------------------------------------------------------------------------------------------

networks:
  saltbox:
    external: true

services:
  who-is-it:
    build: .
    container_name: who-is-it
    restart: unless-stopped
    environment:
      - PORT=8080
    networks:
      - saltbox
    labels:
      com.github.saltbox.saltbox_managed: "true"
      traefik.enable: "true"

      # --- HTTP -> HTTPS redirect router ---
      traefik.http.routers.who-is-it-http.entrypoints: "web"          # *** older Saltbox: "http"
      traefik.http.routers.who-is-it-http.rule: "Host(`who.onlybbm.com`)"
      traefik.http.routers.who-is-it-http.middlewares: "globalHeaders@file,redirect-http,cloudflarewarp@docker,gzip@file"
      traefik.http.routers.who-is-it-http.service: "who-is-it"

      # --- HTTPS router (this is the one that serves the site + WebSocket) ---
      traefik.http.routers.who-is-it.entrypoints: "websecure"         # *** older Saltbox: "https"
      traefik.http.routers.who-is-it.rule: "Host(`who.onlybbm.com`)"
      traefik.http.routers.who-is-it.middlewares: "globalHeaders@file,secureHeaders@file,cloudflarewarp@docker,gzip@file"
      traefik.http.routers.who-is-it.tls.certresolver: "cfdns"        # *** matches Saltbox's default; if yours differs, copy from an existing container
      traefik.http.routers.who-is-it.tls.options: "securetls@file"
      traefik.http.routers.who-is-it.service: "who-is-it"

      # --- the container's internal port ---
      traefik.http.services.who-is-it.loadbalancer.server.port: "8080"
