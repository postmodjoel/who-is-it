<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Habbo avatar review — d0/d3 approval loop</title>
<!--
  Staged approval loop: SOURCE portrait vs Habbo d0/d3, per character.
  Serve from the PROJECT ROOT so the parent game scripts resolve, e.g.
      cd "WHO IS THAT claude" && python3 -m http.server 4188
      open http://localhost:4188/habbo_audit_mapping_ready/tools/habbo-avatar-review.html
  This page WRITES NOTHING. It builds copy-paste JSON patches + fetch commands.
-->
<style>
  :root { color-scheme: dark; }
  body { margin: 0; padding: 18px; background: #14161d; color: #f2f2ee; font: 14px/1.45 system-ui, sans-serif; }
  h1 { font-size: 1.2rem; margin: 0 0 4px; }
  .sub { color: #9aa0ae; font-size: 0.8rem; margin: 0 0 14px; }
  .toolbar { display: flex; gap: 10px; align-items: center; margin-bottom: 14px; flex-wrap: wrap; }
  .toolbar select, .toolbar button, .card button, .card select { background: #232733; color: #f2f2ee; border: 1px solid #3a4050; border-radius: 6px; padding: 6px 10px; font-weight: 700; cursor: pointer; }
  .count { color: #9aa0ae; font-size: 0.8rem; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(430px, 1fr)); gap: 14px; }
  .card { background: #1c1f28; border: 1px solid #2c3140; border-radius: 12px; padding: 12px; }
  .card.approved { border-color: #2f7d4f; }
  .card.bad { border-color: #8a3030; }
  .head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .head b { font-size: 1rem; }
  .status { font-size: 0.68rem; font-weight: 800; padding: 2px 8px; border-radius: 999px; background: #333a4c; }
  .status.approved { background: #1d5c38; }
  .status.needs_refetch, .status.api_failed, .status.manual_download_needed { background: #6e2a2a; }
  .faces { display: flex; gap: 10px; align-items: flex-end; margin-bottom: 8px; }
  .face { text-align: center; }
  .face figcaption { font-size: 0.62rem; color: #9aa0ae; margin-top: 2px; }
  .face img { background: #2a2e3a; border-radius: 8px; display: block; }
  .face .src { width: 120px; height: 120px; object-fit: cover; }
  .face .habbo { height: 120px; width: auto; image-rendering: pixelated; }
  .traits { font-size: 0.7rem; color: #c8ccd6; margin: 6px 0; display: grid; grid-template-columns: 1fr 1fr; gap: 1px 12px; }
  .traits b { color: #8fa3c8; font-weight: 600; }
  .sw { display: inline-block; width: 10px; height: 10px; border-radius: 2px; vertical-align: -1px; margin-right: 3px; border: 1px solid #0006; }
  .fig { width: 100%; box-sizing: border-box; background: #14161d; color: #ffd76e; border: 1px solid #3a4050; border-radius: 6px; padding: 6px 8px; font: 11px/1.3 ui-monospace, monospace; margin: 4px 0; }
  .dbg { font-size: 0.64rem; color: #9aa0ae; margin: 4px 0; }
  .dbg .miss { color: #e08a8a; }
  textarea.notes { width: 100%; box-sizing: border-box; min-height: 34px; background: #14161d; color: #f2f2ee; border: 1px solid #3a4050; border-radius: 6px; font: 12px/1.4 system-ui; padding: 6px 8px; }
  .row { display: flex; gap: 8px; align-items: center; margin-top: 8px; flex-wrap: wrap; }
  .row label { font-size: 0.75rem; font-weight: 700; display: flex; align-items: center; gap: 5px; }
  .copyout { position: fixed; right: 16px; bottom: 16px; background: #1d5c38; color: #fff; padding: 10px 16px; border-radius: 8px; font-weight: 800; display: none; z-index: 9; }
</style>
</head>
<body>
<h1>Habbo avatar review — d0 / d3 approval loop</h1>
<p class="sub">Source portrait (the truth) vs the Habbo render. Fix the figure, copy the refetch command, run it, refresh here. Bulk download stays locked until every card is approved. Nothing on this page saves files — use the copy buttons.</p>
<div class="toolbar">
  <select id="filter">
    <option value="">All statuses</option>
    <option>needs_review</option><option>needs_refetch</option><option>approved</option>
    <option>api_failed</option><option>manual_download_needed</option>
  </select>
  <button id="copyPlan">📋 Copy FULL updated plan JSON</button>
  <button id="copyCmds">📋 Copy refetch commands (needs_refetch)</button>
  <span class="count" id="count"></span>
</div>
<div class="grid" id="grid"></div>
<div class="copyout" id="copyout">Copied ✓</div>

<script src="../../game-data.js"></script>
<script src="../../face-generator.js"></script>
<script src="../../faces-hair.js"></script>
<script>
const bust = () => `?t=${Date.now()}`;
let plan = null, sources = new Map();

function toast() { const t = document.getElementById("copyout"); t.style.display = "block"; setTimeout(() => t.style.display = "none", 900); }
function copy(text) { navigator.clipboard.writeText(text).then(toast); }

async function boot() {
  plan = await (await fetch("../assets/habbo/avatar-review-plan.json" + bust())).json();
  // The REAL source portraits: the same generator + character factory the game itself uses.
  try {
    const chars = window.faceGenerator.createCharacters(() => [], []);
    chars.forEach((c) => sources.set(c.id, c));
  } catch (e) { console.warn("source portraits unavailable:", e); }
  render();
}

function patchFor(cid) {
  const c = plan.characters[cid];
  return JSON.stringify({ characters: { [cid]: {
    status: c.status, approved: c.approved,
    habboMapping: { figure: c.habboMapping.figure },
    comparisonNotes: c.comparisonNotes
  } } }, null, 1);
}
function cmdFor(cid) {
  const c = plan.characters[cid];
  return `python3 tools/fetch-habbo-avatar-review.py ${cid} --figure "${c.habboMapping.figure}"`;
}

function render() {
  const filter = document.getElementById("filter").value;
  const grid = document.getElementById("grid");
  grid.innerHTML = "";
  const entries = Object.entries(plan.characters).filter(([, c]) => !filter || c.status === filter);
  const counts = {};
  Object.values(plan.characters).forEach((c) => { counts[c.status] = (counts[c.status] || 0) + 1; });
  const approvedN = Object.values(plan.characters).filter((c) => c.approved).length;
  document.getElementById("count").textContent =
    `${entries.length} shown · ${approvedN}/${Object.keys(plan.characters).length} approved · ` +
    Object.entries(counts).map(([k, v]) => `${k}:${v}`).join("  ") +
    (approvedN === Object.keys(plan.characters).length ? "  🔓 BULK UNLOCKED" : "  🔒 bulk locked");

  for (const [cid, c] of entries) {
    const src = sources.get(cid);
    const t = c.sourceTraits, hm = c.habboMapping;
    const card = document.createElement("div");
    card.className = "card" + (c.approved ? " approved" : /failed|manual|refetch/.test(c.status) ? " bad" : "");
    card.innerHTML = `
      <div class="head"><b>${src ? src.name : cid}</b><span class="status ${c.status}">${c.status}</span></div>
      <div class="faces">
        <figure class="face"><img class="src" src="${src ? src.image : ""}" alt=""><figcaption>SOURCE (truth)</figcaption></figure>
        <figure class="face"><img class="habbo" src="../${hm.downloaded.d0 || ""}${bust()}" alt=""><figcaption>habbo d0</figcaption></figure>
        <figure class="face"><img class="habbo" src="../${hm.downloaded.d3 || ""}${bust()}" alt=""><figcaption>habbo d3</figcaption></figure>
      </div>
      <div class="traits">
        <span><b>skin</b> <i class="sw" style="background:${t.skinTone}"></i>${t.skinTone}</span>
        <span><b>hair</b> ${t.hair} <i class="sw" style="background:${t.hairColor}"></i></span>
        <span><b>top</b> ${t.top}</span>
        <span><b>face</b> ${t.facialHair || "clean"} · ${t.accessories || "no acc"}</span>
      </div>
      <input class="fig" value="${hm.figure}" spellcheck="false" title="Habbo figure string — edit, then copy the refetch command">
      <div class="dbg">tokens: ${Object.entries(hm.mappedTokens || {}).map(([k, v]) => `${k}=${v}`).join(" ") || "—"}
        ${hm.debug && hm.debug.missed && hm.debug.missed.length ? `· <span class="miss">missed: ${hm.debug.missed.join(", ")}</span>` : ""}
        ${hm.debug && hm.debug.score != null ? `· score ${hm.debug.score}` : ""}
        ${c.lastFailure ? `· <span class="miss">last failure: ${c.lastFailure}</span>` : ""}</div>
      <textarea class="notes" placeholder="comparison notes (wrong skin tone, sunburnt face, wrong shirt…)">${(c.comparisonNotes || []).join("\n")}</textarea>
      <div class="row">
        <select class="st">
          ${["needs_review", "needs_refetch", "approved", "api_failed", "manual_download_needed"].map((s) => `<option ${s === c.status ? "selected" : ""}>${s}</option>`).join("")}
        </select>
        <label><input type="checkbox" class="ap" ${c.approved ? "checked" : ""}> approved</label>
        <button class="cpPatch">📋 patch</button>
        <button class="cpCmd">📋 refetch cmd</button>
      </div>`;
    card.querySelector(".fig").addEventListener("input", (e) => { hm.figure = e.target.value.trim(); });
    card.querySelector(".notes").addEventListener("input", (e) => { c.comparisonNotes = e.target.value.split("\n").filter(Boolean); });
    card.querySelector(".st").addEventListener("change", (e) => { c.status = e.target.value; if (c.status !== "approved") c.approved = false; render(); });
    card.querySelector(".ap").addEventListener("change", (e) => { c.approved = e.target.checked; if (c.approved) c.status = "approved"; render(); });
    card.querySelector(".cpPatch").addEventListener("click", () => copy(patchFor(cid)));
    card.querySelector(".cpCmd").addEventListener("click", () => copy(cmdFor(cid)));
    grid.appendChild(card);
  }
}

document.getElementById("filter").addEventListener("change", render);
document.getElementById("copyPlan").addEventListener("click", () => {
  plan.bulkDownloadAllowed = Object.values(plan.characters).every((c) => c.approved);
  copy(JSON.stringify(plan, null, 1));
});
document.getElementById("copyCmds").addEventListener("click", () => {
  const cmds = Object.entries(plan.characters).filter(([, c]) => c.status === "needs_refetch").map(([cid]) => cmdFor(cid));
  copy(cmds.join("\n") || "# nothing marked needs_refetch");
});
boot();
</script>
</body>
</html>
