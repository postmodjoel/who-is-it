<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Clothing Studio</title>
    <link rel="stylesheet" href="assets/fonts/fonts.css">
    <link rel="stylesheet" href="clothing-lab.css?v=7">
  </head>
  <body>
    <main class="studio-shell">
      <header class="topbar">
        <div class="brand-block">
          <span class="kicker">WHO? IS IT? / DESIGN TOOLS</span>
          <h1>Clothing Studio</h1>
        </div>
        <nav class="top-actions" aria-label="Design tools">
          <a class="icon-text-button" href="face-studio.html">Face Studio</a>
          <a class="icon-button" href="index.html" aria-label="Back to game" title="Back to game">←</a>
        </nav>
      </header>

      <section class="studio-toolbar" aria-label="Clothing Studio toolbar">
        <label class="select-control">
          <span>Model</span>
          <select id="characterSelect"></select>
        </label>
        <label class="select-control">
          <span>Category</span>
          <select id="categoryFilter"></select>
        </label>
        <label class="search-control">
          <span>Find outfit</span>
          <input id="searchInput" type="search" placeholder="Search clothing">
        </label>
        <div class="toolbar-spacer"></div>
        <button id="copyExportButton" class="command-button primary" type="button">Copy changed profiles</button>
        <button id="resetAllButton" class="command-button danger" type="button">Reset drafts</button>
      </section>

      <section class="workspace">
        <aside class="inspector" aria-label="Selected clothing controls">
          <div class="selected-heading">
            <div>
              <span id="selectedCategory" class="kicker">CORE</span>
              <h2 id="selectedName">Crew Tee</h2>
            </div>
            <div class="step-character" aria-label="Move between outfits">
              <button id="previousOutfit" class="icon-button" type="button" aria-label="Previous outfit" title="Previous outfit">←</button>
              <button id="nextOutfit" class="icon-button" type="button" aria-label="Next outfit" title="Next outfit">→</button>
            </div>
          </div>

          <div class="preview-mode" role="group" aria-label="Preview mode">
            <button type="button" data-preview-mode="adjusted" class="is-active">Adjusted</button>
            <button type="button" data-preview-mode="split">Split</button>
            <button type="button" data-preview-mode="baseline">Baseline</button>
          </div>

          <section id="layerDiagnostics" class="layer-diagnostics" aria-label="Clothing layer diagnostics">
            <div class="section-title"><h3>Layer view</h3><span>Collared garments</span></div>
            <div class="layer-view" role="group" aria-label="Layer view">
              <button type="button" data-layer-view="composite" class="is-active">Composite</button>
              <button type="button" data-layer-view="layerMap">Layer Map</button>
              <button type="button" data-layer-view="occlusion">Occlusion</button>
            </div>
            <div id="layerVisibility" class="layer-visibility" aria-label="Visible clothing layers"></div>
          </section>

          <div id="heroPreview" class="hero-preview"></div>

          <section class="palette-panel" aria-label="Preview palette">
            <div class="section-title"><h3>Palette</h3><span>Preview only</span></div>
            <div class="colour-grid">
              <label><span>Primary</span><input id="primaryColor" type="color"></label>
              <label><span>Accent</span><input id="accentColor" type="color"></label>
              <label><span>Under</span><input id="underColor" type="color"></label>
            </div>
          </section>

          <div id="controlSections" class="control-sections"></div>

          <div class="inspector-actions">
            <button id="resetOutfitButton" class="command-button" type="button">Reset outfit</button>
            <button id="copyOutfitButton" class="command-button" type="button">Copy outfit profile</button>
          </div>
        </aside>

        <section class="review-surface">
          <section class="comparison-section" aria-labelledby="comparisonTitle">
            <div class="surface-heading">
              <div>
                <span class="kicker">FIT CHECK</span>
                <h2 id="comparisonTitle">Across six bodies</h2>
              </div>
              <div id="fitLegend" class="legend"></div>
            </div>
            <div id="comparisonGrid" class="comparison-grid"></div>
          </section>

          <section class="catalog-section" aria-labelledby="catalogTitle">
            <div class="surface-heading">
              <div>
                <span class="kicker">WARDROBE</span>
                <h2 id="catalogTitle">All outfits</h2>
              </div>
              <div id="catalogStats" class="catalog-stats"></div>
            </div>
            <div id="outfitGrid" class="outfit-grid"></div>
          </section>

          <section class="export-section" aria-labelledby="exportTitle">
            <div class="surface-heading">
              <div>
                <span class="kicker">HANDOFF</span>
                <h2 id="exportTitle">Changed clothing profiles</h2>
              </div>
              <button id="copyBottomExportButton" class="command-button" type="button">Copy</button>
            </div>
            <textarea id="exportOutput" readonly spellcheck="false"></textarea>
          </section>
        </section>
      </section>
    </main>

    <script src="faces-hair.js?v=210"></script>
    <script src="studio-bakes-import.js?v=3"></script>
    <script src="clothing-profiles.js?v=3"></script>
    <script src="face-generator.js?v=264"></script>
    <script src="clothing-lab.js?v=9"></script>
  </body>
</html>
